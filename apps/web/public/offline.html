<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anbyans — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A1628;
      color: #fff;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 2rem;
      text-align: center;
      gap: 1.5rem;
    }
    img { width: 80px; height: 80px; border-radius: 20px; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: #94a3b8; font-size: 0.95rem; max-width: 280px; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #0D9488;
      color: #fff;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img src="/icons/icon-192x192.png" alt="Anbyans" />
  <h1>Ou pa konekte</h1>
  <p>Tcheke koneksyon entènèt ou epi eseye ankò.</p>
  <button onclick="location.reload()">Eseye ankò</button>
</body>
</html>
